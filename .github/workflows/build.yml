name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            rustflags: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            rustflags: "-C target-cpu=native"
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            rustflags: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - run: cargo build --release --target ${{ matrix.target }}
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}

      - name: Rename binary
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            mv target/${{ matrix.target }}/release/bannerify.exe bannerify-${{ matrix.target }}.exe
          else
            mv target/${{ matrix.target }}/release/bannerify bannerify-${{ matrix.target }}
          fi

      - uses: softprops/action-gh-release@v2
        with:
          files: bannerify-${{ matrix.target }}*
